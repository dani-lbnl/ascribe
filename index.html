<!DOCTYPE html>
<html>
  <head>
    <title>ASCRIBE Multi-Platform WebXR</title>
    <!-- A-Frame Core Library -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- A-Frame Extras: Handles model structure and animations -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <!-- Super Hands: Handles VR controller grabbing, pulling, and scaling -->
    <script src="https://unpkg.com/super-hands@^3.0.3/dist/super-hands.min.js"></script>
    <!-- Orbit Controls: Enables mouse dragging, panning, and zooming on desktop -->
    <script src="https://unpkg.com/aframe-orbit-controls@1.3.2/dist/aframe-orbit-controls.min.js"></script>

    <!-- Custom A-Frame component to force transparency onto GLTF materials -->
    <script>
      AFRAME.registerComponent('force-transparency', {
        schema: { opacity: { type: 'number', default: 0.4 } },
        init: function () {
          this.el.addEventListener('model-loaded', () => {
            const obj3D = this.el.getObject3D('mesh');
            if (obj3D) {
              obj3D.traverse((node) => {
                if (node.isMesh && node.material) {
                  node.material.transparent = true;
                  node.material.opacity = this.data.opacity;
                  node.material.depthWrite = false; // Prevents inner-face clipping issues in VR
                  node.material.needsUpdate = true;
                }
              });
            }
          });
        }
      });
    </script>
  </head>
  <body>

    <a-scene webxr>
      <a-assets>
        <!-- Your raw GLB hosted directly in your ASCRIBE repository -->
        <a-asset-item id="ascribe-mesh" src="https://raw.githubusercontent.com/dani-lbnl/ascribe/main/4UN3.glb"></a-asset-item>

        <!-- Interactive mixin for grabbing, dragging, and scaling -->
        <a-mixin id="interactable"
                 hoverable grabbable stretchable
                 super-hands="colliderEvent: raycaster-intersection;
                              colliderEventProperty: els;
                              colliderEndEvent:raycaster-intersection-cleared;
                              colliderEndEventProperty: clearedEls;">
        </a-mixin>
      </a-assets>

      <!-- 1. CAMERAS & DESKTOP MOUSE CONTROLS -->
      <!-- On desktop, this lets you drag to orbit, right-click to pan, and scroll to zoom -->
      <a-entity id="cameraRig">
        <a-entity id="camera" camera
                  position="0 1.6 0"
                  orbit-controls="target: 0 1.2 -1.5;
                                  enableLookHand: false;
                                  initialPosition: 0 1.6 1.5;
                                  minDistance: 0.5;
                                  maxDistance: 10;">
        </a-entity>
      </a-entity>

      <!-- 2. VR CONTROLLERS (Only active when in headset VR mode) -->
      <!-- Left Hand -->
      <a-entity sphere-collider="objects: .network-model"
                super-hands
                hand-controls="hand: left"
                laser-controls="hand: left"
                raycaster="objects: .network-model; far: 20">
      </a-entity>

      <!-- Right Hand -->
      <a-entity sphere-collider="objects: .network-model"
                super-hands
                hand-controls="hand: right"
                laser-controls="hand: right"
                raycaster="objects: .network-model; far: 20">
      </a-entity>

      <!-- 3. THE GEOMETRY CONTAINER -->
      <!-- Scaled down significantly (0.3) and placed comfortably in front of you (z = -1.5) -->
      <a-entity class="network-model"
                mixin="interactable"
                position="0 1.2 -1.5"
                scale="0.3 0.3 0.3">
        <!-- Visual GLB model with custom transparency applied -->
        <a-gltf-model src="#ascribe-mesh" force-transparency="opacity: 0.4"></a-gltf-model>
      </a-entity>

      <!-- Lighting and Background -->
      <a-sky color="#0A0A0C"></a-sky>
      <a-light type="ambient" color="#FFF" intensity="0.8"></a-light>
      <a-light type="directional" color="#00D2FF" intensity="0.6" position="-2 4 1"></a-light>
      <a-light type="directional" color="#FF007F" intensity="0.4" position="2 1 1"></a-light>
    </a-scene>

  </body>
</html>
