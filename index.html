<!DOCTYPE html>
<html>
  <head>
    <title>ASCRIBE WebXR - Dani Vision</title>
    <!-- Main A-Frame Library -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- Component for controller tracking & interactions -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-super-hands-component@master/dist/super-hands.min.js"></script>
  </head>
  <body>
    <!-- we add 'physics' handling so objects can register hand overlaps -->
    <a-scene webxr>
      <a-assets>
        <!-- Your PoreSpy Mesh -->
        <a-asset-item id="my-mesh" src="pore_network.glb"></a-asset-item>
        
        <!-- Mixin defining that an object can be hovered, grabbed, and scaled with two hands -->
        <a-mixin id="interactable"
                 hoverable grabbable stretchable
                 shadow-component>
        </a-mixin>
      </a-assets>

      <!-- 1. THE USER & CONTROLLERS -->
      <!-- Left Hand Controller -->
      <a-entity sphere-collider="objects: .cube, .network-model" 
                super-hands
                hand-controls="hand: left">
      </a-entity>
      <!-- Right Hand Controller -->
      <a-entity sphere-collider="objects: .cube, .network-model" 
                super-hands
                hand-controls="hand: right">
      </a-entity>

      <!-- 2. YOUR INTERACTIVE OBJECT -->
      <!-- We wrap your GLB in a generic entity container that accepts the interaction commands -->
      <a-entity class="network-model"
                mixin="interactable"
                position="0 1.5 -1.5" 
                scale="0.1 0.1 0.1">
        <!-- The visual model itself nested inside -->
        <a-gltf-model src="#my-mesh"></a-gltf-model>
      </a-entity>
      
      <!-- Environment Setup -->
      <a-sky color="#1A1A1A"></a-sky>
      <a-light type="ambient" color="#FFF"></a-light>
    </a-scene>
  </body>
</html>
